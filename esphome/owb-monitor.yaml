# Thesada OWB Monitor
# Central Boiler E-Classic — house loop and barn loop
# SPDX-License-Identifier: Apache-2.0

esphome:
  name: thesada-owb
  friendly_name: "Thesada OWB Monitor"

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Thesada-OWB-Fallback"

mqtt:
  broker: !secret mqtt_broker
  username: !secret mqtt_user
  password: !secret mqtt_password
  topic_prefix: thesada/owb

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

web_server:
  port: 80

# TODO: confirm GPIO pin assignments against LILYGO T-SIM7080-S3 pinout
one_wire:
  - platform: gpio
    pin: GPIO4

i2c:
  sda: GPIO8
  scl: GPIO9

ads1115:
  - address: 0x48

sensor:
  # Temperature sensors — DS18B20
  # TODO: replace addresses after running 1-Wire scan
  - platform: dallas_temp
    address: 0x0000000000000000
    name: "House Loop Supply Temp"
    update_interval: 60s
    filters:
      - sliding_window_moving_average:
          window_size: 60
          send_every: 60

  - platform: dallas_temp
    address: 0x0000000000000001
    name: "House Loop Return Temp"
    update_interval: 60s
    filters:
      - sliding_window_moving_average:
          window_size: 60
          send_every: 60

  - platform: dallas_temp
    address: 0x0000000000000002
    name: "Barn Loop Supply Temp"
    update_interval: 60s
    filters:
      - sliding_window_moving_average:
          window_size: 60
          send_every: 60

  - platform: dallas_temp
    address: 0x0000000000000003
    name: "Barn Loop Return Temp"
    update_interval: 60s
    filters:
      - sliding_window_moving_average:
          window_size: 60
          send_every: 60

  # Current sensors — SCT-013-030 via ADS1115
  - platform: ads1115
    multiplexer: 'A0_GND'
    gain: 6.144
    name: "House Pump Current"
    update_interval: 60s
    filters:
      - sliding_window_moving_average:
          window_size: 60
          send_every: 60

  - platform: ads1115
    multiplexer: 'A1_GND'
    gain: 6.144
    name: "Barn Pump Current"
    update_interval: 60s
    filters:
      - sliding_window_moving_average:
          window_size: 60
          send_every: 60